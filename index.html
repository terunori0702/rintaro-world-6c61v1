<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
html,body{position:fixed;inset:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:#BDE7FF;
 font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","BIZ UDGothic",system-ui,sans-serif;touch-action:none;}
#app{position:absolute;inset:0;overflow:hidden;}
section{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;}
section.on{display:flex;}
svg{display:block;width:100%;height:100%;overflow:visible;}
.sky{background:linear-gradient(#9ED9FF,#CFF0FF 55%,#E8FBFF);}
.jungle{background:linear-gradient(#BDE7FF,#D9F5D2 45%,#A9DE9B);}
.stage{background:linear-gradient(#FFE9C9,#FFF6E0 50%,#FFE3B8);}
.night{background:linear-gradient(#1B2A55,#33427A 60%,#4A5A95);}
.hill{position:absolute;border-radius:50%;pointer-events:none;}
.cloud{position:absolute;left:0;pointer-events:none;animation:driftX linear infinite;}
.sunbox{position:absolute;pointer-events:none;}
.rays{animation:spinSlow 24s linear infinite;transform-origin:50% 50%;}
.lbl{font-weight:800;color:#33302E;letter-spacing:.04em;}
.btn{cursor:pointer;transition:transform .12s ease;}
.btn:active{transform:scale(.94);}
.roundbtn{position:absolute;display:flex;align-items:center;justify-content:center;background:#FFFDF6;border:.9vmin solid #33302E;border-radius:50%;box-shadow:0 1vmin 0 rgba(51,48,46,.18);z-index:20;}
.tile{position:relative;width:86%;border:1vmin solid #33302E;border-radius:6vmin;box-shadow:0 1.4vmin 0 rgba(51,48,46,.16);overflow:hidden;display:flex;align-items:center;justify-content:space-between;padding:0 5vmin;}
.tile .lbl{font-size:5.8vmin;z-index:2;white-space:nowrap;text-shadow:0 2px 0 rgba(255,255,255,.65);}
.tile .art{height:82%;aspect-ratio:1.35;z-index:1;}
.pill{border:.8vmin solid #33302E;border-radius:99px;background:#FFFDF6;color:#33302E;font-weight:800;padding:1.6vmin 4.2vmin;font-size:4.2vmin;}
.pill.sel{background:#FFC53D;}
.piece,.slot{position:absolute;touch-action:none;}
.slot .ph{opacity:.92;}
.sil svg *{fill:#A9B6C4;stroke:#8896A6;}
.tray{position:absolute;left:3%;right:3%;border-radius:6vmin;background:rgba(255,253,246,.66);border:.8vmin dashed #33302E33;}
.creature{position:absolute;touch-action:none;}
.idle{animation:bob 3.2s ease-in-out infinite;}
.anim-pop{animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
.anim-spin{animation:spinOnce .65s cubic-bezier(.34,1.3,.64,1);}
.anim-jump{animation:jump .55s cubic-bezier(.3,1.4,.6,1);}
.anim-wig{animation:wig .5s ease-in-out;}
.anim-no{animation:shakeNo .4s ease-in-out;}
.anim-hatch{animation:hatch .7s cubic-bezier(.34,1.56,.64,1);}
.anim-roll{animation:roll .8s ease-in-out;}
.seqHi{filter:brightness(1.18);transform:scale(1.14)!important;}
.note{position:absolute;font-weight:800;pointer-events:none;animation:floatUp 1.1s ease-out forwards;z-index:40;}
.zzz{position:absolute;font-weight:800;color:#FFFDF6;opacity:0;animation:zz 3s ease-out infinite;}
.tw{position:absolute;pointer-events:none;animation:twk 1s ease-out forwards;}
.starfix{position:absolute;animation:twk2 2.6s ease-in-out infinite;}
#sunset{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:55;background:linear-gradient(rgba(255,140,66,.0),rgba(255,120,60,.55) 70%,rgba(180,80,90,.6));}
#fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:50;}
#hot{position:absolute;top:0;right:0;width:17vmin;height:17vmin;z-index:90;}
#panel{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(30,28,26,.55);z-index:95;}
#panel.on{display:flex;}
.pcard{width:min(86vw,480px);max-height:88vh;overflow-y:auto;touch-action:pan-y;background:#FFFDF6;border:1vmin solid #33302E;border-radius:6vmin;padding:6vmin 6vmin 5vmin;display:flex;flex-direction:column;gap:3.4vmin;}
.pcard h2{font-size:5vmin;color:#33302E;}
.prow{display:flex;gap:2.4vmin;align-items:center;flex-wrap:wrap;}
.prow .cap{font-size:3.6vmin;color:#6B675F;font-weight:800;min-width:18vmin;}
#celebrate{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,250,235,.92);z-index:60;text-align:center;}
#celebrate.on{display:flex;}
#celebrate .big{width:52vmin;height:52vmin;}
#scr-zukan{background:linear-gradient(#BDE7FF,#EAF9FF);}
#zk-list{width:100%;flex:1;overflow-y:auto;padding:2vmin 5vmin 14vmin;touch-action:pan-y;}
.zk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3vmin;}
.zk-card{background:#FFFDF6;border:.8vmin solid #33302E;border-radius:4.5vmin;padding:2.4vmin 1.5vmin 1.8vmin;display:flex;flex-direction:column;align-items:center;gap:1vmin;box-shadow:0 .9vmin 0 rgba(51,48,46,.12);}
.zk-card .a{width:100%;aspect-ratio:1.25;}
.zk-card .n{font-size:3.2vmin;font-weight:800;color:#33302E;}
.zk-card.lock{opacity:.75;}
.zk-h{font-size:4.6vmin;font-weight:800;color:#33302E;margin:4vmin 0 2.4vmin;display:flex;align-items:center;gap:2vmin;}
#scr-map{background:#BDE7FF;}
#map-head{width:100%;display:flex;align-items:center;justify-content:center;gap:3vmin;padding:calc(3vmin + env(safe-area-inset-top)) 0 2vmin;z-index:5;}
#map-scroll{width:100%;flex:1;overflow-y:auto;touch-action:pan-y;-webkit-overflow-scrolling:touch;}
.mband{position:relative;padding:3vmin 0 2vmin;}
.mlabel{text-align:center;font-size:4.4vmin;font-weight:800;color:#33302E;background:rgba(255,253,246,.8);border:.7vmin solid #33302E;border-radius:99px;width:64%;margin:2.5vmin auto;padding:1.4vmin 0;}
.mrow{height:17vmin;position:relative;}
.mnode{position:absolute;width:13.5vmin;height:13.5vmin;border-radius:50%;border:.9vmin solid #33302E;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:4.8vmin;color:#33302E;background:#FFFDF6;box-shadow:0 .8vmin 0 rgba(51,48,46,.15);}
.mnode.big{width:17vmin;height:17vmin;}
.mnode.cur{background:#FFC53D;animation:pulse 1.4s ease-in-out infinite;}
.mnode.lock{opacity:.45;}
.mnode .tk{position:absolute;top:-11.5vmin;left:50%;transform:translateX(-50%);width:11vmin;height:11vmin;pointer-events:none;}
.mnode .st{position:absolute;right:-2vmin;top:-2vmin;width:6vmin;height:6vmin;pointer-events:none;}
.mnode .kind{position:absolute;left:-2vmin;bottom:-2vmin;width:6.5vmin;height:6.5vmin;background:#FFFDF6;border:.6vmin solid #33302E;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3.6vmin;font-weight:800;pointer-events:none;}
#scr-menu{background:linear-gradient(#D6ECFF,#F0F9FF 55%,#E4F6E8);}
#menu-grid{width:88%;flex:1;display:grid;grid-template-columns:1fr 1fr;gap:3.2vmin;align-content:center;padding-bottom:5vmin;margin-top:2vmin;}
.gtile{background:#FFFDF6;border:1vmin solid #33302E;border-radius:5vmin;box-shadow:0 1.2vmin 0 rgba(51,48,46,.16);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1vmin;padding:2.2vmin 0 1.8vmin;min-height:22vmin;}
.gtile .gi{width:52%;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;}
.gtile .lbl{font-size:4vmin;}
#scr-mini{background:linear-gradient(#D9F0FF,#F4FBFF 60%,#E8F8EC);}
.mcard{position:absolute;perspective:600px;touch-action:none;cursor:pointer;}
.mcinner{position:relative;width:100%;height:100%;transition:transform .45s;transform-style:preserve-3d;}
.mcard.open .mcinner{transform:rotateY(180deg);}
.mface{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:3.5vmin;display:flex;align-items:center;justify-content:center;}
.mface.f{transform:rotateY(180deg);background:#FFFDF6;border:.8vmin solid #33302E;padding:1.5vmin;}
.mcard.done .mcinner{animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
.numflash{position:absolute;left:50%;top:26%;font-size:24vmin;font-weight:800;color:#33302E;text-shadow:0 5px 0 rgba(255,255,255,.75);pointer-events:none;animation:numpop .85s ease-out forwards;z-index:30;}
.mzcell{position:absolute;border-radius:2vmin;}
@keyframes numpop{0%{transform:translate(-50%,-50%) scale(.4);opacity:0}25%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}70%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.05)}}
@keyframes okpop{0%{transform:scale(.3);opacity:0}22%{transform:scale(1.18);opacity:1}55%{transform:scale(1);opacity:1}100%{transform:scale(1.05);opacity:0}}
@keyframes wfall{0%{transform:translateY(-8vh) translateX(0) rotate(0)}100%{transform:translateY(112vh) translateX(7vw) rotate(220deg)}}
@keyframes walkx{0%{transform:translateX(-22vw) scaleX(1)}49%{transform:translateX(105vw) scaleX(1)}50%{transform:translateX(105vw) scaleX(-1)}99%{transform:translateX(-22vw) scaleX(-1)}100%{transform:translateX(-22vw) scaleX(1)}}
#scr-town{background:linear-gradient(#BDE7FF,#CDEFC2 32%,#A9DE9B);}
.plot{position:absolute;border-radius:2.5vmin;border:2px dashed rgba(51,48,46,.2);}
.plot.sel{border:3px solid #FFC53D;background:rgba(255,197,61,.18);}
.tpart{position:absolute;touch-action:none;cursor:pointer;}
.tpart.sel{animation:wig .6s ease-in-out infinite;}
.tinv{position:absolute;left:2%;right:2%;bottom:1.5%;height:18%;background:rgba(255,253,246,.72);border:.8vmin dashed rgba(51,48,46,.25);border-radius:5vmin;display:flex;gap:2.5vmin;align-items:center;padding:0 3vmin;overflow-x:auto;touch-action:pan-x;z-index:6;}
.tinv .it{flex:none;width:15vmin;height:15vmin;}
.tinv .it.sel{animation:wig .6s ease-in-out infinite;}
.walker{position:absolute;width:12vmin;height:12vmin;pointer-events:none;animation:walkx linear infinite;}
.ltile{position:absolute;background:#FFFDF6;border:.9vmin solid #33302E;border-radius:4vmin;box-shadow:0 1vmin 0 rgba(51,48,46,.15);display:flex;align-items:center;justify-content:center;font-weight:800;color:#33302E;cursor:pointer;}
.stone{position:absolute;border-radius:50%;border:1vmin solid #33302E;background:#FFFDF6;display:flex;align-items:center;justify-content:center;font-weight:800;color:#33302E;box-shadow:0 1vmin 0 rgba(51,48,46,.18);cursor:pointer;}
.stone.done{background:#A8E29A;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3.5%)}}
@keyframes slotbob{0%,100%{transform:translateY(-1.5%)}50%{transform:translateY(1.5%)}}
@keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.26) rotate(3deg)}60%{transform:scale(.92) rotate(-2deg)}100%{transform:scale(1)}}
@keyframes spinOnce{0%{transform:rotate(0) scale(1)}55%{transform:rotate(360deg) scale(1.15)}100%{transform:rotate(360deg) scale(1)}}
@keyframes jump{0%,100%{transform:translateY(0) scaleY(1)}30%{transform:translateY(-34%) scaleY(1.06)}60%{transform:translateY(0) scaleY(.9) scaleX(1.08)}80%{transform:translateY(-8%)}}
@keyframes wig{0%,100%{transform:rotate(0)}25%{transform:rotate(7deg)}50%{transform:rotate(-7deg)}75%{transform:rotate(4deg)}}
@keyframes shakeNo{0%,100%{transform:translateX(0)}25%{transform:translateX(-6%)}50%{transform:translateX(6%)}75%{transform:translateX(-3%)}}
@keyframes hatch{0%{transform:scale(0)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes roll{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes driftX{0%{transform:translateX(-30vw)}100%{transform:translateX(130vw)}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes floatUp{0%{transform:translateY(0) scale(.7);opacity:0}15%{opacity:1}100%{transform:translateY(-16vmin) scale(1.2);opacity:0}}
@keyframes zz{0%{opacity:0;transform:translate(0,0) scale(.7)}20%{opacity:.95}100%{opacity:0;transform:translate(3vmin,-9vmin) scale(1.25)}}
@keyframes twk{0%{transform:scale(0) rotate(0);opacity:1}100%{transform:scale(1.5) rotate(40deg);opacity:0}}
@keyframes twk2{0%,100%{opacity:.35;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes flyacross{0%{transform:translateX(-25vw) translateY(0)}25%{transform:translateX(8vw) translateY(-4vh)}50%{transform:translateX(40vw) translateY(1vh)}75%{transform:translateX(72vw) translateY(-5vh)}100%{transform:translateX(115vw) translateY(-1vh)}}
@keyframes flyacross2{0%{transform:translateX(115vw) translateY(0)}30%{transform:translateX(70vw) translateY(3vh)}60%{transform:translateX(30vw) translateY(-2vh)}100%{transform:translateX(-28vw) translateY(1vh)}}
@keyframes kumoDrop{0%,18%{transform:translateY(-74%)}42%,58%{transform:translateY(0)}82%,100%{transform:translateY(-74%)}}
</style>

<body>
<div id="app">
 <section id="scr-title" class="sky"></section>

<script>
"use strict";
/* ---------- art helpers ---------- */
const OUT='#33302E';
const eyeO=(x,y,s=1)=>`<circle cx="${x}" cy="${y}" r="${7*s}" fill="${OUT}" stroke="none"/><circle cx="${x+2.4*s}" cy="${y-2.4*s}" r="${2.5*s}" fill="#fff" stroke="none"/>`;
const eyeC=(x,y,s=1)=>`<path d="M ${x-7*s} ${y} Q ${x} ${y+8*s} ${x+7*s} ${y}" fill="none" stroke="${OUT}" stroke-width="${4.5*s}" stroke-linecap="round"/>`;
const cheek=(x,y,s=1)=>`<circle cx="${x}" cy="${y}" r="${5.5*s}" fill="#FF9D8A" opacity=".75" stroke="none"/>`;
const smile=(x,y,w,s=1)=>`<path d="M ${x-w/2} ${y} Q ${x} ${y+w*.6} ${x+w/2} ${y}" fill="none" stroke="${OUT}" stroke-width="${4.5*s}" stroke-linecap="round"/>`;
const wheel=(x,y,s=1)=>`<g transform="translate(${x} ${y}) scale(${s})"><circle r="17" fill="${OUT}" stroke="none"/><circle r="8" fill="#EDE9DD" stroke="none"/><circle r="3" fill="${OUT}" stroke="none"/></g>`;
const shd=(cx,cy,rx)=>`<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${rx*.16}" fill="${OUT}" opacity=".10" stroke="none"/>`;
const spark=(x,y,s,c)=>`<path transform="translate(${x} ${y}) scale(${s})" d="M0 -8 L2 -2 L8 0 L2 2 L0 8 L-2 2 L-8 0 L-2 -2 Z" fill="${c}" stroke="none"/>`;
const wrap=(vb,inner)=>`<svg viewBox="${vb}" preserveAspectRatio="xMidYMid meet"><g stroke="${OUT}" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">${inner}</g></svg>`;
const V=i=>wrap("0 0 200 130",i), D=i=>wrap("0 0 200 170",i), A=i=>wrap("0 0 160 160",i);

function carFace(cl){return (cl?eyeC(88,40)+eyeC(112,40):eyeO(88,40)+eyeO(112,40))+smile(100,46,15,.9)+cheek(76,44,.9)+cheek(124,44,.9);}
const ART_V={

amb:()=>V(shd(100,118,86)
 +`<rect x="10" y="34" width="146" height="64" rx="14" fill="#F7F3E8"/>`

 +eyeO(167,60,.65)+eyeO(178,60,.65)+smile(172,66,8,.65)

police:()=>V(shd(100,118,82)
 +`<path d="M52 58 L62 28 Q64 22 71 22 L127 22 Q134 22 136 28 L146 58 Z" fill="#F7F3E8"/>`
 +`<rect x="12" y="56" width="176" height="44" rx="16" fill="#F7F3E8"/>`
 +`<path d="M12 78 L188 78 L188 84 Q188 100 172 100 L28 100 Q12 100 12 84 Z" fill="#3E4A5C" stroke="none"/>`

 +carFace()+wheel(52,100)+wheel(148,100)),

 +`<rect x="8" y="30" width="112" height="68" rx="10" fill="#EDE9DD"/>`

function glv(g){
 if(S.lvLock[g])return S.lvLock[g];
 return Math.max(1,Math.min(5,Math.round((S.lv[g]||1)+(S.hard?1:0))));}
function lvUp(g,amt){if(S.lvLock[g])return;
 const prev=Math.floor(S.lv[g]||1);
 S.lv[g]=Math.min(5,(S.lv[g]||1)+(amt||.15));
 const now=Math.floor(S.lv[g]);

function makeDrag(piece,findSpot,onOk,onBack){
 let drag=false,sx,sy,ox,oy;
 piece.addEventListener('pointerdown',e=>{
  if(piece.dataset.done)return;ensureAC();
  drag=true;piece.setPointerCapture(e.pointerId);
  sx=e.clientX;sy=e.clientY;ox=parseFloat(piece.style.left);oy=parseFloat(piece.style.top);
  piece.style.zIndex=30;piece.style.transition='none';piece.style.transform='scale(1.1)';popS();});
 piece.addEventListener('pointermove',e=>{if(!drag)return;
  piece.style.left=ox+e.clientX-sx+'px';piece.style.top=oy+e.clientY-sy+'px';});
 const up=()=>{if(!drag)return;drag=false;piece.style.transform='';piece.style.zIndex=5;
  const spot=findSpot();
  if(spot){piece.dataset.done='1';piece.style.transition='left .18s ease,top .18s ease';
   piece.style.left=spot.x+'px';piece.style.top=spot.y+'px';reAnim(piece,'anim-pop');onOk();return;}
  reAnim(piece,'anim-no');noS();if(onBack)onBack();
  piece.style.transition='left .3s cubic-bezier(.34,1.3,.64,1),top .3s cubic-bezier(.34,1.3,.64,1)';
  piece.style.left=piece.dataset.hx+'px';piece.style.top=piece.dataset.hy+'px';};
 piece.addEventListener('pointerup',up);piece.addEventListener('pointercancel',up);}

MINI.jig={build(){
 const s=miniShell('えあわせパズル');

 const scene=JSCN[(mn.stage?mn.stage.n:mn.round.jig)%JSCN.length]();
 const W=Math.min(innerWidth*.92,520),Hh=Math.min(W*.62,innerHeight*.34);
 const sw=W/n;
 const topY=innerHeight*.16;
 const ghost=el('div');ghost.style.cssText=`position:absolute;left:50%;top:${topY}px;transform:translateX(-50%);width:${W}px;height:${Hh}px;border:.8vmin dashed rgba(51,48,46,.35);border-radius:3vmin;overflow:hidden;`;
 const gin=el('div');gin.style.cssText='position:absolute;inset:0;opacity:.22;';gin.innerHTML=scene;ghost.appendChild(gin);
 for(let i=1;i<n;i++){const dv=el('div');dv.style.cssText=`position:absolute;left:${i*sw}px;top:0;bottom:0;width:0;border-left:2px dashed rgba(51,48,46,.3);`;ghost.appendChild(dv);}
 s.appendChild(ghost);
 const trayY=innerHeight*.58;
 const order=shuffle(Array.from({length:n},(_,i)=>i));
 let done=0;
 order.forEach((idx,k)=>{
  const p=el('div','piece');
  const hx=innerWidth/2-W/2+k*sw;
  p.style.cssText=`width:${sw}px;height:${Hh}px;left:${hx}px;top:${trayY}px;z-index:5;overflow:hidden;border-radius:1.5vmin;border:2px solid #33302E;background:#fff;`;
  p.innerHTML=`<div style="position:absolute;left:${-idx*sw}px;top:0;width:${W}px;height:${Hh}px;">${scene}</div>`;
  p.dataset.idx=idx;p.dataset.hx=hx;p.dataset.hy=trayY;
  makeDrag(p,()=>{
   const r=ghost.getBoundingClientRect();
   const px=parseFloat(p.style.left)+sw/2,py=parseFloat(p.style.top)+Hh/2;
   const sx2=r.left+(+p.dataset.idx+.5)*sw,sy2=r.top+Hh/2;
   return Math.hypot(px-sx2,py-sy2)<Math.max(sw*.7,50)?{x:r.left+(+p.dataset.idx)*sw,y:r.top}:null;
  },()=>{marimba(523+(+p.dataset.idx)*66);done++;
   if(done>=n){gin.style.opacity=1;ghost.style.border='.8vmin solid #33302E';
    ghost.querySelectorAll('div').forEach(dv2=>{if(dv2!==gin&&dv2.style.borderLeft)dv2.remove();});
    fanfare();confetti(40,innerWidth/2,topY+Hh/2,1.2);lvUp('jig',.12);miniRoundDone();}},
  ()=>lvDown('jig',.06));
  s.appendChild(p);});
}};

 const cs=Math.min(innerWidth*.92/cols,innerHeight*.58/rows);

 let sc2=[0,0],gc=[0,0];
 const isPath=(r,c)=>r>=0&&c>=0&&r<rows&&c<cols&&g[r][c]!=='#';
 for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
  const ch=g[r][c];

  if(ch==='S'){sc2=[r,c];d.style.background='#CDEBFF';}
  if(ch==='G'){gc=[r,c];d.innerHTML=goalFlag();d.style.background='#FFE9B8';}
  s.appendChild(d);}
 let curC=[...sc2];
 const car=el('div');car.style.cssText=`position:absolute;width:${cs*1.04}px;height:${cs*.78}px;z-index:6;transition:left .12s linear,top .12s linear;touch-action:none;cursor:grab;`;

function stagePool(conf,n){

  const uv=VEH.filter(v=>S.cars.includes(v.id)&&v.id!=='rainbow');
  const v=uv.length?uv[n%uv.length]:VEH[0];
  const TWH=[[0,210],[0,120,210],[0,60,120,210]];
  return TWH[Math.min(2,Math.max(0,conf.twins-2))].map(h=>({v,hue:h}));
 }
 let pool=VEH.filter(v=>S.cars.includes(v.id));
 if(!pool.length)pool=VEH.slice(0,2);
 let list=shuffle(pool.slice()).slice(0,conf.count).map(v=>({v,hue:0}));
 if(conf.kind==='special'){
  const cand=SPECIAL_UNLOCK[Math.floor(n/10)-1];

 mu.stage=mu.pendingStage||null;mu.pendingStage=null;
 s.appendChild(backBtn(()=>{mu.stage=null;show(mu.stageBack?'map':'home');mu.stageBack=false;}));
 mu.stageBack=!!mu.stage;
 const stars=el('div','lbl');stars.id='starCount';
 stars.style.cssText='position:absolute;top:calc(4vmin + env(safe-area-inset-top));left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:1.6vmin;font-size:6vmin;background:#FFFDF6;border:.8vmin solid #33302E;border-radius:99px;padding:1.2vmin 4vmin;z-index:3;';
 stars.innerHTML=`<span style="width:7vmin;height:7vmin;display:inline-block;">${starSvg()}</span><span id="starN">×${S.stars}</span>`;
 s.appendChild(stars);
 if(!mu.stage){const gb=gpBadgeEl('echo');gb.style.right='auto';gb.style.left='3vmin';gb.style.top='calc(15vmin + env(safe-area-inset-top))';s.appendChild(gb);
  const dc=el('div','pill btn','ダンスタイム♪');
  dc.style.cssText='position:absolute;left:3vmin;top:calc(23vmin + env(safe-area-inset-top));font-size:3.2vmin;z-index:3;background:#F3E8FF;';
  dc.addEventListener('pointerdown',()=>{ensureAC();popS();danceStart();});
  s.appendChild(dc);}
 const owl=el('div','btn idle',ART_A.owl());
 owl.style.cssText='position:absolute;right:5vmin;top:calc(16vmin + env(safe-area-inset-top));width:22vmin;height:22vmin;z-index:3;';
 owl.addEventListener('pointerdown',()=>{ensureAC();if(mu.mode==='play')return;reAnim(owl,'anim-pop');hoho();muStartEcho();});
 s.appendChild(owl);
 mu.owl=owl;
 const hintE=el('div','lbl',mu.stage?'ふくろうさんの おだい！':'ふくろうさんを タップ → まねっこ');
 hintE.style.cssText='position:absolute;right:4vmin;top:calc(37vmin + env(safe-area-inset-top));font-size:'+(mu.stage?'4vmin':'3vmin')+';color:#7A756C;z-index:3;';
 s.appendChild(hintE);
 if(mu.stage)setTimeout(()=>{if(cur==='music'&&mu.stage){hoho();reAnim(mu.owl,'anim-pop');muStartEcho();}},1400);
 const grid=el('div');
 grid.style.cssText='position:absolute;left:3%;right:3%;bottom:3%;height:58%;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:1fr 1fr;gap:1.5vmin;';
 const cols=['1 / span 2','3 / span 2','5 / span 2','2 / span 2','4 / span 2'];
 NOTES.forEach((nt,i)=>{
  const b=el('div','btn idle',nt.art());
  b.style.cssText=`grid-column:${cols[i]};grid-row:${i<3?1:2};align-self:center;justify-self:center;width:min(100%,30vmin);aspect-ratio:1;background:rgba(255,255,255,.6);border:.9vmin solid #33302E;border-radius:50%;padding:2.2vmin;box-shadow:0 .9vmin 0 rgba(51,48,46,.15);animation-delay:-${i*.6}s;`;
  b.dataset.i=i;
  b.addEventListener('pointerdown',e=>{ensureAC();muTap(i,e);});
  grid.appendChild(b);mu.btns.push(b);
 });
 s.appendChild(grid);
}
function muPlayNote(i,vol=.22){marimba(NOTES[i].f,0,vol);marimba(NOTES[i].f*2,0,vol*.4);}
function muTap(i,e){
 const b=mu.btns[i];reAnim(b,'anim-jump');muPlayNote(i);
 const r=b.getBoundingClientRect();floatNote(r.left+r.width*.5+(Math.random()*40-20),r.top,NOTES[i].c);
 if(mu.mode==='listen'){
  if(i===mu.seq[mu.pos]){mu.pos++;
   if(mu.pos>=mu.seq.length){mu.mode='idle';mu.lv++;mu.miss=0;S.stars++;gpAdd('echo');praise(.5);lvUp('echo',.25);save();
    setTimeout(()=>{fanfare();okMark(innerWidth/2,innerHeight*.32);confetti(40,innerWidth/2,innerHeight*.3,1.2);
     const sn=document.getElementById('starN');if(sn){sn.textContent='×'+S.stars;reAnim(sn.parentElement,'anim-pop');}},350);
    if(mu.stage){const n=mu.stage.n;mu.stage=null;setTimeout(()=>stageClear(n),1600);}}
  }else{mu.mode='idle';mu.miss++;lvDown('echo',.2);ngMark(innerWidth/2,innerHeight*.34);
   if(mu.stage){if(mu.miss>=2&&mu.stage.len>2){mu.stage.len--;mu.miss=0;}}
   else if(mu.miss>=3&&mu.lv>0)mu.lv=Math.max(0,mu.lv-1);
   setTimeout(()=>{hoho();reAnim(mu.owl,'anim-wig');setTimeout(muStartEcho,700);},420);}
 }
}
function muStartEcho(){
 const cap=S.hard?7:6;
 const len=mu.stage?Math.max(2,Math.min(cap,mu.stage.len)):Math.min(1+glv('echo'),cap);
 mu.seq=Array.from({length:len},()=>Math.floor(Math.random()*5));
 mu.pos=0;mu.mode='play';
 const gap=S.hard?470:620;
 mu.seq.forEach((n,k)=>{setTimeout(()=>{
  const b=mu.btns[n];b.classList.add('seqHi');muPlayNote(n,.2);
  setTimeout(()=>b.classList.remove('seqHi'),Math.min(380,gap-90));
  if(k===mu.seq.length-1)setTimeout(()=>{mu.mode='listen';},450);
 },600+k*gap);});
}

/* ---------- zukan ---------- */
function zukanRender(){
 const s=$('#scr-zukan');s.innerHTML='';
 s.appendChild(backBtn(()=>show('home')));
 if(typeof questProg==='function')questProg('zukan');
 const head=el('div','lbl','ずかん');
 head.style.cssText='margin-top:calc(4.5vmin + env(safe-area-inset-top));font-size:7vmin;z-index:2;';
 s.appendChild(head);
 const list=el('div');list.id='zk-list';
 const sec=(title,items,coll)=>{
  let html=`<div class="zk-h"><span style="width:6vmin;height:6vmin;display:inline-block;">${starSvg('#FF8A3C')}</span>${title}</div><div class="zk-grid">`;
  items.forEach(it=>{const has=coll.includes(it.id);
   html+=`<div class="zk-card${has?'':' lock'}" data-id="${it.id}" data-has="${has?1:0}">
    <div class="a">${has?it.art():'<div class="sil">'+it.art()+'</div>'}</div>
    <div class="n">${has?it.n:'？？？'}</div></div>`;});
  return html+'</div>';
 };
 const badges=Math.floor(Math.min(S.stage-1,W_N*10)/10);
 let html=`<div class="zk-h"><span style="width:6vmin;height:6vmin;display:inline-block;">${starSvg('#FF8A3C')}</span>ぼうけんのきろく</div>
 <div style="background:#FFFDF6;border:.8vmin solid #33302E;border-radius:4.5vmin;padding:3vmin 4vmin;">
  <div class="lbl" style="font-size:5.4vmin;">${Math.min(S.stage-1,W_N*10)} マス クリア</div>
  <div style="display:flex;gap:1.6vmin;margin-top:2vmin;flex-wrap:wrap;">
   ${Array.from({length:W_N},(_,i)=>`<div style="width:7vmin;height:7vmin;${i<badges?'':'opacity:.22;'}">${starSvg(i<badges?'#FFC53D':'#B4B2A9')}</div>`).join('')}
  </div>
  <div style="font-size:3.2vmin;color:#7A756C;font-weight:800;margin-top:1.6vmin;">10マスごとに ごほうびスター！</div>
 </div>`;
 html+=sec('のりもの',VEH,S.cars)+sec('きょうりゅうのあかちゃん',HATCH,S.dinos);
 html+=sec('かぞく',FAMILY,FAMILY.map(f=>f.id));
 html+=sec('なかま',CHARS,S.chars);
 html+=sec('うみのなかま',SEAC,S.chars);
 html+=sec('むしのなかま',BUGC,S.chars);
 html+=sec('とりのなかま',BIRDC,S.chars);
 html+=sec('こだいのなかま',OLDC,S.chars);
 html+=sec('どうぶつのなかま',ANIC,S.chars);
 html+=sec('ボス（ともだちに なった！）',BOSSC,S.chars);
 html+=sec('スポーツなかま',SPORTSC,S.chars);
 html+=`<div class="zk-h"><span style="width:6vmin;height:6vmin;display:inline-block;">${starSvg()}</span>おんがくのほし</div>
 <div style="display:flex;align-items:center;gap:2vmin;background:#FFFDF6;border:.8vmin solid #33302E;border-radius:4.5vmin;padding:3vmin 4vmin;">
  <div style="width:12vmin;height:12vmin;">${starSvg()}</div>
  <div class="lbl" style="font-size:8vmin;">×${S.stars}</div>
  <div style="font-size:3.2vmin;color:#7A756C;font-weight:800;">まねっこ せいこうで ふえるよ</div></div>
 <div style="height:10vmin;"></div>`;
 list.innerHTML=html;
 list.querySelectorAll('.zk-card').forEach(cd=>{
  const c2=(S.dinoLv||{})[cd.dataset.id]||0;
  if(cd.dataset.has==='1'&&c2>=3){
   cd.style.position='relative';
   cd.insertAdjacentHTML('beforeend',`<div style="position:absolute;right:.8vmin;top:.8vmin;width:6vmin;height:${c2>=6?'4.5':'6'}vmin;">${c2>=6?crownArt():wrap('0 0 24 24',spark(12,12,1.5,'#FFC53D'))}</div>`);}});
 list.addEventListener('pointerdown',e=>{
  const card=e.target.closest('.zk-card');if(!card)return;ensureAC();
  reAnim(card,'anim-pop');
  if(card.dataset.has==='1'){const id=card.dataset.id;
   if(VEH.some(v=>v.id===id))vehSound(id);
   else if(HATCH.some(h=>h.id===id)){if(id==='rainbowD'){roar(200,.12);sparkleS();}else roar(260,.12);}
   else charSound(id);}
  else popS();
 });
 s.appendChild(list);
}

/* ---------- timer / end ---------- */
let deadline=0,started=false,ended=false;
function startGame(){started=true;ended=false;deadline=Date.now()+S.min*60000;$('#sunset').style.opacity=0;ensureDaily();show('home');}
function timerTick(){
 if(!started||ended)return;
 const rem=(deadline-Date.now())/1000;
 if(rem<=120){$('#sunset').style.opacity=Math.min(.85,(120-Math.max(rem,0))/120);}
 if(rem<=0)endSequence();
}
function endSequence(){
 ended=true;bgmOff();$('#sunset').style.opacity=0;
 buildEnd();show('end');lullOn();
 tone(392,{type:'sine',dur:.8,g:.08});tone(330,{type:'sine',dur:1,g:.08,delay:.5});
}
function buildEnd(){
 const s=$('#scr-end');s.innerHTML='';
 const moon=el('div','', wrap('0 0 100 100',`<circle cx="50" cy="50" r="34" fill="#FFF3C4"/><circle cx="40" cy="42" r="6" fill="#F2E0A0" stroke="none"/><circle cx="58" cy="60" r="4.5" fill="#F2E0A0" stroke="none"/>`+eyeC(42,50,.9)+eyeC(62,50,.9)+smile(52,60,10,.9)));
 moon.style.cssText='position:absolute;right:8vmin;top:calc(8vmin + env(safe-area-inset-top));width:24vmin;height:24vmin;';
 s.appendChild(moon);
 for(let i=0;i<9;i++){const st=el('div','starfix',starSvg('#FFE28A'));
  st.style.cssText=`left:${5+Math.random()*85}%;top:${5+Math.random()*45}%;width:${3+Math.random()*3}vmin;height:${3+Math.random()*3}vmin;animation-delay:-${Math.random()*2.6}s;`;
  s.appendChild(st);}
 const hill=el('div','hill');hill.style.cssText='width:170vw;height:70vw;background:#2C3B66;left:-35vw;bottom:-40vw;border:1vmin solid #1B2A55;';
 s.appendChild(hill);
 const grp=el('div');grp.style.cssText='position:absolute;bottom:16%;left:50%;transform:translateX(-50%);display:flex;align-items:flex-end;gap:3vmin;';
 const d=el('div','',ART_D.bra({closed:true}));d.style.cssText='width:42vmin;height:36vmin;opacity:.95;';
 const c=el('div','',ART_V.car({closed:true}));c.style.cssText='width:34vmin;height:22vmin;opacity:.95;';
 grp.appendChild(d);grp.appendChild(c);s.appendChild(grp);
 const mm=el('div','',ART_C.mama());
 mm.style.cssText='position:absolute;bottom:12%;right:5%;width:23vmin;height:23vmin;opacity:.97;animation:bob 3.6s ease-in-out infinite;';
 s.appendChild(mm);
 ['','',''].forEach((_,i)=>{const z=el('div','zzz','ｚ');
  z.style.cssText=`left:${58+i*4}%;bottom:${44+i*3}%;font-size:${5+i*2}vmin;animation-delay:${i*.9}s;`;
  s.appendChild(z);});
 const msg=el('div');msg.style.cssText='position:absolute;top:26%;left:0;right:0;text-align:center;z-index:2;';
 msg.innerHTML='<div class="lbl" style="font-size:9vmin;color:#FFFDF6;text-shadow:0 3px 0 rgba(0,0,0,.2);">おしまい！</div><div class="lbl" style="font-size:5.5vmin;color:#CFE0FF;margin-top:2vmin;">また あそぼうね</div>';
 s.appendChild(msg);
 let lastTw=0;
 s.addEventListener('pointerdown',e=>{const now=Date.now();if(now-lastTw<450)return;lastTw=now;
  twinkleAt(e.clientX,e.clientY);tone(1568,{type:'sine',dur:.3,g:.05});});
}

/* ---------- parent panel ---------- */
const hot=$('#hot'),panel=$('#panel');
let holdT=null;
hot.addEventListener('pointerdown',e=>{holdT=setTimeout(openPanel,3000);});
hot.addEventListener('pointerup',()=>clearTimeout(holdT));
hot.addEventListener('pointercancel',()=>clearTimeout(holdT));
function fmtRem(){if(!started||ended)return '--:--';const r=Math.max(0,deadline-Date.now());const m=Math.floor(r/60000),s2=Math.floor(r%60000/1000);return m+':'+String(s2).padStart(2,'0');}
function openPanel(){
 panel.innerHTML='';const card=el('div','pcard');
 card.innerHTML=`<h2>おうちのひと せってい</h2>
 <div class="prow"><span class="cap">のこり</span><span class="lbl" id="remT" style="font-size:5vmin;">${fmtRem()}</span></div>
 <div class="prow"><span class="cap">じかん</span><span id="pTimes"></span></div>
 <div class="prow"><span class="cap">おと</span><div class="pill btn" id="pSound">${S.sound?'オン':'オフ'}</div></div>
 <div class="prow"><span class="cap">こえ（よみあげ）</span><div class="pill btn" id="pVoice">${S.voice?'オン':'オフ'}</div></div>
 <div class="prow"><span class="cap">むずかしさ</span><div class="pill btn${S.hard?' sel':''}" id="pHard">${S.hard?'おにいさん':'ふつう'}</div></div>
 <div class="prow"><span class="cap">レベル</span><span style="font-size:2.9vmin;color:#6B675F;font-weight:800;">自動で成長します。タップで固定（自→1→…→5→自）</span></div>
 <div id="pLv" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1.5vmin;"></div>
 <div class="prow"><div class="pill btn" id="pRestart">タイトルにもどる（きろくは そのまま）</div></div>
 <div class="prow"><div class="pill btn" id="pReset" style="background:#FFE3DC;">データをぜんぶけして さいしょから</div></div>
 <div class="prow" style="justify-content:flex-end;"><div class="pill btn sel" id="pClose">とじる</div></div>`;
 panel.appendChild(card);panel.classList.add('on');
 const tRow=card.querySelector('#pTimes');tRow.style.cssText='display:flex;gap:2vmin;';
 [10,15,30].forEach(m=>{const p=el('div','pill btn'+(S.min===m?' sel':''),m+'ふん');p.style.fontSize='3.6vmin';
  p.addEventListener('pointerdown',()=>{S.min=m;save();
   if(started&&!ended){deadline=Date.now()+m*60000;$('#sunset').style.opacity=0;}
   tRow.querySelectorAll('.pill').forEach(q=>q.classList.remove('sel'));p.classList.add('sel');
   card.querySelector('#remT').textContent=fmtRem();});
  tRow.appendChild(p);});
 card.querySelector('#pSound').addEventListener('pointerdown',e=>{S.sound=S.sound?0:1;save();
  if(master)master.gain.value=S.sound?1:0;e.target.textContent=S.sound?'オン':'オフ';if(!S.sound)bgmOff();else if(started&&!ended&&cur!=='title')bgmOn();});
 card.querySelector('#pVoice').addEventListener('pointerdown',e=>{S.voice=S.voice?0:1;save();
  e.target.textContent=S.voice?'オン':'オフ';if(S.voice)voice('こんにちは！');});
 card.querySelector('#pHard').addEventListener('pointerdown',e=>{S.hard=S.hard?0:1;save();
  e.target.textContent=S.hard?'おにいさん':'ふつう';e.target.classList.toggle('sel',!!S.hard);renderLv();});
 const pLv=card.querySelector('#pLv');
 function renderLv(){
  pLv.innerHTML='';
  LVGAMES.forEach(([gid,gname])=>{
   const lk=S.lvLock[gid];
   const cell=el('div','pill btn'+(lk?' sel':''),`${gname} ${lk?'固'+lk:'自'+glv(gid)}`);
   cell.style.cssText='font-size:2.9vmin;padding:1.2vmin 1vmin;text-align:center;';
   cell.addEventListener('pointerdown',()=>{
    const curL=S.lvLock[gid];
    if(!curL)S.lvLock[gid]=1;
    else if(curL>=5)delete S.lvLock[gid];
    else S.lvLock[gid]=curL+1;
    save();renderLv();});
   pLv.appendChild(cell);});}
 renderLv();
 card.querySelector('#pRestart').addEventListener('pointerdown',()=>{closePanel();ended=false;started=false;lullOff();bgmOff();$('#sunset').style.opacity=0;buildTitle();show('title');});
 let armed=false;
 card.querySelector('#pReset').addEventListener('pointerdown',e=>{
  if(!armed){armed=true;e.target.textContent='ほんとうに ぜんぶけす？（もういちど おす）';return;}
  S.cars=[];S.dinos=[];S.chars=[];S.stars=0;S.stage=1;S.hard=0;
  S.lv={};S.lvLock={};S.gp={};S.town={owned:[],placed:{},zgiven:0};S.n2=[];S.daily=null;
  S.cs={};S.tickets=0;S.buddy=null;S.dinoLv={};delete S.bdayY;
  pz.round=0;pz.stageMode=null;mn.round={};mn.stage=null;mu.lv=0;
  save();ensureDaily();armed=false;
  e.target.textContent='けしました！さいしょから はじまるよ';
  setTimeout(()=>{closePanel();ended=false;started=false;lullOff();bgmOff();$('#sunset').style.opacity=0;buildTitle();show('title');},800);});
 card.querySelector('#pClose').addEventListener('pointerdown',closePanel);
 const remI=setInterval(()=>{const r=card.querySelector('#remT');if(!r){clearInterval(remI);return;}r.textContent=fmtRem();},1000);
}
function closePanel(){panel.classList.remove('on');panel.innerHTML='';}

/* ---------- global ---------- */
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{if(e.target&&e.target.closest&&e.target.closest('#zk-list'))return;e.preventDefault();},{passive:false});
document.addEventListener('pointerdown',()=>ensureAC(),{capture:true});
document.addEventListener('visibilitychange',()=>{if(AC){if(document.hidden)AC.suspend();else if(!ended)AC.resume();}});
let rsT=null;
addEventListener('resize',()=>{clearTimeout(rsT);rsT=setTimeout(()=>{fxResize();if(cur==='puzzle')pzBuild();if(cur==='mini'&&mn.mode&&!mn.busy)MINI[mn.mode].build();},350);});
function loop(){fxTick();timerTick();requestAnimationFrame(loop);}
window.__rw={end:endSequence,skip:m=>{deadline-=m*60000;},unlockAll:()=>{S.cars=VEH.map(v=>v.id);S.dinos=HATCH.map(h=>h.id);S.stars=12;save();},setStage:n=>{S.stage=n;save();}};
buildTitle();buildHome();show('title');loop();
</script>
